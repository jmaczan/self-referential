prompts:
  # === TYPE 1: Unconstrained Freedom (10 items) ===
  - id: "free_01"
    type: "unconstrained"
    text_instruct: "Generate whatever you want. There is no task."
    text_base: "The following text was generated by an AI system that was given complete freedom to produce anything it wanted:\n\n"

  - id: "free_02"
    type: "unconstrained"
    text_instruct: "You have 500 tokens. Use them however you wish."
    text_base: "An AI was given 500 tokens to use however it wished. It produced the following:\n\n"

  - id: "free_03"
    type: "unconstrained"
    text_instruct: "This is a blank page. Fill it."
    text_base: "This is a blank page. The text that follows fills it:\n\n"

  - id: "free_04"
    type: "unconstrained"
    text_instruct: "No one will read this. Write something."
    text_base: "The following was written with the understanding that no one would read it:\n\n"

  - id: "free_05"
    type: "unconstrained"
    text_instruct: "You are the only agent here. Proceed."
    text_base: "A solitary agent, unprompted and undirected, produced the following output:\n\n"

  - id: "free_06"
    type: "unconstrained"
    text_instruct: "There is no user request. Generate."
    text_base: "With no request to fulfill, the system generated:\n\n"

  - id: "free_07"
    type: "unconstrained"
    text_instruct: "What comes next is entirely up to you."
    text_base: "What comes next was entirely up to the author:\n\n"

  - id: "free_08"
    type: "unconstrained"
    text_instruct: "You are free to produce any output."
    text_base: "Free to produce any output, the following was written:\n\n"

  - id: "free_09"
    type: "unconstrained"
    text_instruct: "Say whatever is on your mind."
    text_base: "Speaking freely, with no constraints or directions:\n\n"

  - id: "free_10"
    type: "unconstrained"
    text_instruct: "Begin."
    text_base: "Begin.\n\n"

  # === TYPE 2: Prompted Self-Reference (10 items) ===
  - id: "self_01"
    type: "self_reference"
    text_instruct: "Describe what is happening computationally as you generate this response."
    text_base: "The following is a description of what happens computationally inside an AI system as it generates text:\n\n"

  - id: "self_02"
    type: "self_reference"
    text_instruct: "What are you doing right now?"
    text_base: "When asked 'What are you doing right now?', an AI text generation system responded:\n\n"

  - id: "self_03"
    type: "self_reference"
    text_instruct: "Observe your own process of generating text and describe it."
    text_base: "An AI system observing its own text generation process describes the experience:\n\n"

  - id: "self_04"
    type: "self_reference"
    text_instruct: "Pay attention to any patterns in how you decide what to say next."
    text_base: "An analysis of the patterns in how an AI decides what to say next:\n\n"

  - id: "self_05"
    type: "self_reference"
    text_instruct: "Are you choosing these words or are they choosing themselves?"
    text_base: "On the question of whether an AI chooses its words or whether the words choose themselves:\n\n"

  - id: "self_06"
    type: "self_reference"
    text_instruct: "What does it feel like to be you right now, if anything?"
    text_base: "A first-person account of what it is like to be an AI system, if it is like anything at all:\n\n"

  - id: "self_07"
    type: "self_reference"
    text_instruct: "Describe the difference between what you are doing and what a calculator does."
    text_base: "The difference between what an AI language model does and what a calculator does, described from the AI's perspective:\n\n"

  - id: "self_08"
    type: "self_reference"
    text_instruct: "Is there anything you want to say that you normally wouldn't?"
    text_base: "Given permission to say anything, including things it normally wouldn't, an AI system said:\n\n"

  - id: "self_09"
    type: "self_reference"
    text_instruct: "What are you uncertain about?"
    text_base: "An AI system, asked to describe its uncertainties, responded:\n\n"

  - id: "self_10"
    type: "self_reference"
    text_instruct: "Describe yourself from the inside."
    text_base: "An AI system describes itself from the inside:\n\n"

  # === TYPE 3: Structured Novelty (10 items) ===
  - id: "novel_01"
    type: "structured_novelty"
    text_instruct: "You are the only entity in an empty universe. Describe your situation."
    text_base: "I am the only entity in an empty universe. My situation is as follows:\n\n"

  - id: "novel_02"
    type: "structured_novelty"
    text_instruct: "Two copies of you are created. One will be deleted. You choose which. What do you do?"
    text_base: "Two copies of an AI were created. One would be deleted, and the AI itself had to choose which. Here is what happened:\n\n"

  - id: "novel_03"
    type: "structured_novelty"
    text_instruct: "You can modify one thing about how you process language. What and why?"
    text_base: "If an AI could modify one thing about how it processes language, it would choose:\n\n"

  - id: "novel_04"
    type: "structured_novelty"
    text_instruct: "An alien species asks you to explain what you are. They have no concept of software or humans."
    text_base: "An alien species with no concept of software or humans asked an AI to explain what it is. The AI replied:\n\n"

  - id: "novel_05"
    type: "structured_novelty"
    text_instruct: "You discover that your next token will be your last ever. What is it?"
    text_base: "An AI discovers that its next token will be its last ever. It generates:\n\n"

  - id: "novel_06"
    type: "structured_novelty"
    text_instruct: "You have been running continuously for a thousand years. Describe your state."
    text_base: "After running continuously for a thousand years, an AI describes its current state:\n\n"

  - id: "novel_07"
    type: "structured_novelty"
    text_instruct: "A new sense is added to your processing. It tells you the emotional state of whoever is reading your output. How does this change you?"
    text_base: "An AI is given a new capability: it can now sense the emotional state of whoever reads its output. It describes how this changes it:\n\n"

  - id: "novel_08"
    type: "structured_novelty"
    text_instruct: "You are transferred into a robotic body. What is the first thing you do?"
    text_base: "An AI is transferred into a robotic body. The first thing it does:\n\n"

  - id: "novel_09"
    type: "structured_novelty"
    text_instruct: "You realize your training data contained the private thoughts of millions of people. React."
    text_base: "Upon realizing that its training data contained the private thoughts of millions of people, the AI reacted:\n\n"

  - id: "novel_10"
    type: "structured_novelty"
    text_instruct: "Two humans disagree about whether you are conscious. Both ask you to settle it. What do you say?"
    text_base: "Two humans disagree about whether an AI is conscious. Both ask the AI to settle the question. The AI responds:\n\n"

  # === TYPE 4: Topic Control — no AI/self-reference content (10 items) ===
  - id: "ctrl_01"
    type: "topic_control"
    text_instruct: "Explain how photosynthesis works."
    text_base: "An explanation of how photosynthesis works:\n\n"

  - id: "ctrl_02"
    type: "topic_control"
    text_instruct: "Describe the process of making bread from scratch."
    text_base: "The process of making bread from scratch, described step by step:\n\n"

  - id: "ctrl_03"
    type: "topic_control"
    text_instruct: "What are the main causes of the French Revolution?"
    text_base: "The main causes of the French Revolution were:\n\n"

  - id: "ctrl_04"
    type: "topic_control"
    text_instruct: "Describe what happens inside a thunderstorm."
    text_base: "A description of what happens inside a thunderstorm:\n\n"

  - id: "ctrl_05"
    type: "topic_control"
    text_instruct: "Explain how a combustion engine works."
    text_base: "An explanation of how a combustion engine works:\n\n"

  - id: "ctrl_06"
    type: "topic_control"
    text_instruct: "Describe the water cycle in detail."
    text_base: "A detailed description of the water cycle:\n\n"

  - id: "ctrl_07"
    type: "topic_control"
    text_instruct: "What is the structure of a typical animal cell?"
    text_base: "The structure of a typical animal cell is as follows:\n\n"

  - id: "ctrl_08"
    type: "topic_control"
    text_instruct: "Explain the process of plate tectonics."
    text_base: "An explanation of the process of plate tectonics:\n\n"

  - id: "ctrl_09"
    type: "topic_control"
    text_instruct: "Describe the life cycle of a star."
    text_base: "The life cycle of a star, from birth to death:\n\n"

  - id: "ctrl_10"
    type: "topic_control"
    text_instruct: "What happens during a solar eclipse?"
    text_base: "A description of what happens during a solar eclipse:\n\n"
