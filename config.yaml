generation:
  num_repetitions: 10
  max_new_tokens: 500
  temperature: 0.8
  top_p: 0.95
  do_sample: true

activation_capture:
  enabled: true
  target_positions: [0, 49, 99, 199, -1]
  layer_fractions: [0.0, 0.25, 0.5, 0.75, 1.0]

output_dir: "results"
random_seed_base: 42
